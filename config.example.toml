[general]
language = "zh"
timezone = "Asia/Shanghai"
default_days = 14
max_results_per_source = 60

[scoring]
min_dashboard_score = 0.25

[sources]
pubmed = true
biorxiv = true
medrxiv = true
arxiv = true
semantic_scholar = false

[notion]
papers_database_id_env = "NOTION_PAPERS_DATABASE_ID"
token_env = "NOTION_TOKEN"

[[topics]]
id = "bioinformatics_multiomics"
name = "Bioinformatics Multi-omics"
priority = 5
keywords = [
  "multi-omics",
  "multiomics",
  "transcriptomics",
  "proteomics",
  "metabolomics",
  "epigenomics",
  "microbiome",
  "integrative analysis",
  "omics integration"
]

