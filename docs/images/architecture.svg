<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#F5F7FA"/>
  <rect x="56" y="52" width="1168" height="616" rx="24" fill="#FFFFFF" stroke="#D9E0E7" stroke-width="2"/>
  <text x="88" y="110" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700">BioSci-Radar Architecture</text>
  <text x="88" y="148" fill="#63707C" font-family="Helvetica, Arial, sans-serif" font-size="18">Local-first literature workspace for keyword-driven discovery, frequency analysis, and paper review.</text>

  <rect x="88" y="194" width="248" height="146" rx="18" fill="#F8FBFD" stroke="#CFE0EC" stroke-width="2"/>
  <text x="110" y="234" fill="#1264A3" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">1. Local Web UI</text>
  <text x="110" y="270" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Keyword input</text>
  <text x="110" y="300" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Bilingual toggle</text>
  <text x="110" y="330" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Charts + paginated paper list</text>

  <rect x="404" y="194" width="248" height="146" rx="18" fill="#F8FBFD" stroke="#CFE0EC" stroke-width="2"/>
  <text x="426" y="234" fill="#1264A3" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">2. Fetch API</text>
  <text x="426" y="270" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Receives focus keywords</text>
  <text x="426" y="300" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Runs multi-source fetch</text>
  <text x="426" y="330" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Writes local cache</text>

  <rect x="720" y="194" width="248" height="146" rx="18" fill="#F8FBFD" stroke="#CFE0EC" stroke-width="2"/>
  <text x="742" y="234" fill="#1264A3" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">3. Collectors</text>
  <text x="742" y="270" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">PubMed</text>
  <text x="742" y="300" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">bioRxiv / medRxiv</text>
  <text x="742" y="330" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">arXiv</text>

  <rect x="1036" y="194" width="136" height="146" rx="18" fill="#EEF7F4" stroke="#C9E7DA" stroke-width="2"/>
  <text x="1058" y="234" fill="#0C7A5B" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">4. Score</text>
  <text x="1058" y="274" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="17">Topics</text>
  <text x="1058" y="302" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="17">Omics</text>
  <text x="1058" y="330" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="17">ML tags</text>

  <rect x="88" y="424" width="564" height="176" rx="18" fill="#FFF9F1" stroke="#EED8B2" stroke-width="2"/>
  <text x="110" y="464" fill="#B26A00" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">5. Summary Layer</text>
  <text x="110" y="502" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Keyword frequency</text>
  <text x="110" y="532" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Topic / omics / disease / ML label counts</text>
  <text x="110" y="562" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Source and paper-type distribution</text>

  <rect x="720" y="424" width="452" height="176" rx="18" fill="#F4F0FB" stroke="#D8CDEE" stroke-width="2"/>
  <text x="742" y="464" fill="#6C43AA" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">6. Output Layer</text>
  <text x="742" y="502" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Interactive dashboard</text>
  <text x="742" y="532" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Bilingual Markdown export</text>
  <text x="742" y="562" fill="#17202A" font-family="Helvetica, Arial, sans-serif" font-size="18">Optional Notion sync</text>

  <path d="M336 267H404" stroke="#90A4B4" stroke-width="4" stroke-linecap="round"/>
  <path d="M652 267H720" stroke="#90A4B4" stroke-width="4" stroke-linecap="round"/>
  <path d="M968 267H1036" stroke="#90A4B4" stroke-width="4" stroke-linecap="round"/>
  <path d="M1104 340V390H370V424" stroke="#90A4B4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1104 340V390H946V424" stroke="#90A4B4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
